<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Tickets - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
      <a href="tickets.html" class="active"><i class="fas fa-ticket"></i> Tickets</a>
      <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
      <a href="datos.html"><i class="fas fa-chart-bar"></i> Estadísticas</a>
      <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
      <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus me-1"></i> Recargar</a>
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
    <div class="header-balance"><i class="fas fa-wallet me-1"></i> Bs <span id="navBalance">0.00</span></div>
    <a href="#" onclick="logout()" class="btn btn-outline-light btn-sm d-md-none" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h4><i class="fas fa-ticket me-2"></i> Mis Tickets</h4>
  </div>

  <!-- FILTERS -->
  <div class="section" style="padding-top:0;">
    <div class="stats-card mb-3">
      <label class="form-label fw-bold" style="font-size:13px;">Filtrar por lotería y fecha</label>
      <div class="d-flex gap-2 flex-wrap">
        <select class="form-select" id="loteriaSelect" style="flex:1;min-width:140px;" onchange="cargarTickets()">
          <option value="">Todas</option>
          <option value="lotto_activo">Lotto Activo</option>
          <option value="la_granjita">La Granjita</option>
          <option value="selvaplus">Selva Plus</option>
        </select>
        <input type="date" id="datePicker" class="form-control" style="flex:1;min-width:140px;">
        <button class="btn btn-gold btn-sm" onclick="cargarTickets()"><i class="fas fa-search"></i></button>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="section" style="padding-top:0;">
    <div class="table-responsive">
      <table class="table table-sm table-custom" style="font-size:12px;">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Lotería</th>
            <th>Hora</th>
            <th>Animales</th>
            <th>Total</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="ticketsBody">
          <tr>
            <td colspan="6" class="text-center text-muted py-4">Cargando tickets...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
    <a href="tickets.html" class="active"><i class="fas fa-ticket"></i> Tickets</a>
    <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html"><i class="fas fa-chart-bar"></i> Estadísticas</a>
    <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus-circle"></i> Recargar</a>
    <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script>
    const LOTERIAS = { lotto_activo: 'Lotto Activo', la_granjita: 'La Granjita', selvaplus: 'Selva Plus' };

    document.addEventListener('DOMContentLoaded', async () => {
      const token = requireAuth();
      if (!token) return;
      await updateBalanceDisplay();
      await cargarTickets();
    });

    async function cargarTickets() {
      const tbody = document.getElementById('ticketsBody');
      const loteria = document.getElementById('loteriaSelect').value;
      const fecha = document.getElementById('datePicker').value;

      let params = '?limit=200';
      if (loteria) params += `&loteria=${encodeURIComponent(loteria)}`;
      if (fecha) params += `&fecha=${encodeURIComponent(fecha)}`;

      const res = await apiFetch(`/api/apuestas${params}`);
      if (!res.ok) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Error al cargar tickets</td></tr>';
        return;
      }
      const apuestas = await res.json();
      if (apuestas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No tienes tickets aún</td></tr>';
        return;
      }
      tbody.innerHTML = apuestas.map(a => {
        const animales = a.detalles.map(d => {
          const an = ANIMALES.find(x => String(x.id) === String(d.animal_id));
          return an ? `<i class="fas ${an.icono} me-1"></i>${an.nombre}` : d.animal_id;
        }).join(', ');
        const badges = { pendiente: 'badge bg-warning text-dark', ganada: 'badge bg-success', perdida: 'badge bg-danger', pagada: 'badge bg-primary' };
        const badge = badges[a.estado] || 'badge bg-secondary';
        return `<tr>
          <td>${a.fecha}</td>
          <td>${LOTERIAS[a.loteria] || a.loteria}</td>
          <td>${a.horario}</td>
          <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${animales.replace(/<[^>]+>/g,'')}">${animales}</td>
          <td class="fw-bold">Bs ${a.total.toFixed(2)}</td>
          <td><span class="${badge}">${a.estado.charAt(0).toUpperCase() + a.estado.slice(1)}</span></td>
        </tr>`;
      }).join('');
    }
  </script>
</body>
</html>
