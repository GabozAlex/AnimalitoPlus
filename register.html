<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card animate-fade-up">
    <div class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </div>
    <p class="text-center text-muted mb-4" style="font-size:14px;">Crea tu cuenta gratis</p>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="regNombre" placeholder="Ej: Juan Pérez">
        <div class="error-msg" id="regNombreError"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="regUsuario" placeholder="Ej: juan@correo.com">
        <div class="error-msg" id="regUsuarioError"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="regPass" placeholder="Mínimo 6 caracteres">
        <div class="error-msg" id="regPassError"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-control" id="regPass2" placeholder="Repite la contraseña">
        <div class="error-msg" id="regPass2Error"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="tel" class="form-control" id="regTelefono" placeholder="Ej: 77712345">
        <div class="error-msg" id="regTelefonoError"></div>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-user-plus me-1"></i> Crear Cuenta
      </button>
    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="login.html">Ingresa aquí</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
