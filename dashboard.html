<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak]{display:none!important}</style>
</head>
<body x-data>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html" class="active"><i class="fas fa-gamepad"></i> Jugar</a>
      <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
      <a href="datos.html"><i class="fas fa-chart-bar"></i> Estadísticas</a>
      <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
      <a href="admin.html" id="adminLink" x-show="$store.app.user?.rol === 'admin'" x-cloak><i class="fas fa-cog"></i> Admin</a>
      <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus me-1"></i> Recargar</a>
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
    <div class="header-balance"><i class="fas fa-wallet me-1"></i> Bs <span id="navBalance" x-text="$store.app.balance.toFixed(2)">0.00</span></div>
    <a href="#" onclick="logout()" class="btn btn-outline-light btn-sm d-md-none" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
  </header>

  <!-- LOTTERY SELECTOR -->
  <div class="lottery-selector" id="lotterySelector"></div>

  <!-- HOUR GRID -->
  <div class="hour-grid-label"><i class="fas fa-clock me-1"></i> Horarios disponibles</div>
  <div class="hour-grid" id="hourGrid"></div>

  <!-- BET AMOUNTS -->
  <div class="bet-selector">
    <div class="bet-amt active" data-amt="1">Bs 1</div>
    <div class="bet-amt" data-amt="2">Bs 2</div>
    <div class="bet-amt" data-amt="5">Bs 5</div>
    <div class="bet-amt" data-amt="10">Bs 10</div>
    <div class="bet-amt" data-amt="15">Bs 15</div>
    <div class="bet-amt" data-amt="20">Bs 20</div>
    <div class="bet-amt" data-amt="25">Bs 25</div>
    <div class="bet-amt" data-amt="30">Bs 30</div>
    <div class="bet-amt" data-amt="35">Bs 35</div>
    <div class="bet-amt" data-amt="40">Bs 40</div>
    <div class="bet-amt" data-amt="45">Bs 45</div>
    <div class="bet-amt" data-amt="50">Bs 50</div>
  </div>

  <!-- ANIMAL GRID -->
  <div class="animal-grid" id="animalGrid"></div>

  <!-- COMANDA -->
  <div class="comanda">
    <h6>
      <span><i class="fas fa-shopping-cart me-1"></i> Comanda</span>
      <span class="text-muted" style="font-size:12px;font-weight:400;" id="betCount">0</span>
    </h6>
    <div id="betSlipItems">
      <div class="text-muted text-center py-2" style="font-size:13px;">Selecciona un animal para apostar</div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
      <span style="font-size:13px;">Total:</span>
      <span class="comanda-total" id="betTotal">Bs 0.00</span>
    </div>
    <button class="btn btn-play" id="btnPlay" disabled>
      <i class="fas fa-play me-1"></i> Jugar
    </button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="active"><i class="fas fa-gamepad"></i> Jugar</a>
    <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html"><i class="fas fa-chart-bar"></i> Estadísticas</a>
    <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus-circle"></i> Recargar</a>
    <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script defer src="//cdn.jsdelivr.net/npm/alpinejs@3"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
