<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card animate-fade-up">
    <div class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </div>
    <p class="text-center text-muted mb-4" style="font-size:14px;">Ingresa a tu cuenta</p>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="loginUsuario" placeholder="Tu correo" autocomplete="email">
        <div class="error-msg" id="loginUsuarioError"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="loginPass" placeholder="••••••" autocomplete="current-password">
        <div class="error-msg" id="loginPassError"></div>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt me-1"></i> Ingresar
      </button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
