<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <link rel="manifest" href="/manifest.json">
</head>
<body class="auth-page">

  <div class="auth-card animate-fade-up">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <p class="text-center text-muted mb-4" style="font-size:14px;">Ingresa a tu cuenta</p>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="loginUsuario" placeholder="Tu correo" autocomplete="email">
        <div class="error-msg" id="loginUsuarioError"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="loginPass" placeholder="••••••" autocomplete="current-password">
        <div class="error-msg" id="loginPassError"></div>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt me-1"></i> Ingresar
      </button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script>
    (function() {
      const token = getToken();
      const user = getUser();
      if (token && user) {
        document.querySelector('.auth-card').innerHTML = `
          <div style="text-align:center;padding:20px;">
            <i class="fas fa-check-circle text-success" style="font-size:48px;"></i>
            <h4 class="mt-3">Ya has iniciado sesión</h4>
            <p class="text-muted">Estás logueado como <strong>${user.nombre || user.correo}</strong>.</p>
            <a href="dashboard.html" class="btn btn-gold mt-2"><i class="fas fa-gamepad me-1"></i> Ir al Dashboard</a>
            <a href="#" onclick="event.preventDefault();logout()" class="btn btn-outline-danger mt-2 ms-2"><i class="fas fa-sign-out-alt me-1"></i> Cerrar sesión</a>
          </div>
        `;
      }
    })();
  </script>
  <script src="js/auth.js"></script>
</body>
</html>
