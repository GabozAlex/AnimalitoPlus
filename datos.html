<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganadores - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
      <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
      <a href="datos.html" class="active"><i class="fas fa-trophy"></i> Ganadores</a>
      <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
      <a href="admin.html" id="adminLink" class="d-none"><i class="fas fa-cog"></i> Admin</a>
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
    <a href="#" onclick="logout()" class="btn btn-outline-light btn-sm d-md-none" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h4><i class="fas fa-trophy me-2"></i> Ganadores</h4>
  </div>

  <div class="section" style="padding-top:0;">
    <!-- LOTTERY SELECTOR -->
    <div class="stats-card mb-3">
      <label class="form-label fw-bold" style="font-size:13px;">Seleccionar Lotería</label>
      <select class="form-select" id="loteriaSelect" onchange="cargarGanadores()">
        <option value="">Todas</option>
        <option value="lotto_activo">Lotto Activo</option>
        <option value="la_granjita">La Granjita</option>
        <option value="selvaplus">Selva Plus</option>
      </select>
    </div>

    <!-- WINNERS TABLE -->
    <div class="stats-card">
      <div class="table-responsive">
        <table class="table table-sm table-custom" style="font-size:12px;">
          <thead><tr><th>Fecha</th><th>Lotería</th><th>Usuario</th><th>Animal</th><th>Apostó</th><th>Premio</th></tr></thead>
          <tbody id="ganadoresBody">
            <tr><td colspan="6" class="text-center text-muted py-3">Selecciona una lotería para ver ganadores</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
    <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html" class="active"><i class="fas fa-trophy"></i> Ganadores</a>
    <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = requireAuth();
      if (!token) return;
      const user = getCurrentUser();
      const al = document.getElementById('adminLink');
      if (al && user && user.rol === 'admin') al.classList.remove('d-none');
      await cargarGanadores();
    });

    async function cargarGanadores() {
      const loteria = document.getElementById('loteriaSelect').value;
      const url = loteria ? `/api/admin/ganadores?loteria=${encodeURIComponent(loteria)}` : '/api/admin/ganadores';
      const res = await apiFetch(url);
      if (!res.ok) {
        document.getElementById('ganadoresBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Error al cargar ganadores</td></tr>';
        return;
      }
      const ganadores = await res.json();
      if (ganadores.length === 0) {
        document.getElementById('ganadoresBody').innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Sin ganadores aún</td></tr>';
        return;
      }
      const loterias = { lotto_activo: 'Lotto Activo', la_granjita: 'La Granjita', selvaplus: 'Selva Plus' };
      document.getElementById('ganadoresBody').innerHTML = ganadores.map(g => {
        const an = ANIMALES.find(x => String(x.id) === String(g.animal_id));
        const animalIcon = an ? `<i class="fas ${an.icono} me-1"></i>${an.nombre}` : g.animal_id;
        return `<tr>
          <td>${g.fecha}</td>
          <td>${loterias[g.loteria] || g.loteria}</td>
          <td>${g.usuario_nombre}</td>
          <td>${animalIcon}</td>
          <td>Bs ${g.monto_apostado.toFixed(2)}</td>
          <td class="text-success fw-bold">Bs ${g.premio.toFixed(2)}</td>
        </tr>`;
      }).join('');
    }
  </script>
</body>
</html>
