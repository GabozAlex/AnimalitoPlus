<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak]{display:none!important}</style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <link rel="manifest" href="/manifest.json">
</head>
<body x-data>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
      <a href="tickets.html"><i class="fas fa-ticket"></i> Tickets</a>
      <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
      <a href="datos.html"><i class="fas fa-trophy"></i> Ganadores</a>
      <a href="perfil.html" class="active"><i class="fas fa-user"></i> Perfil</a>
      <a href="admin.html" id="adminLink" x-show="$store.app.user?.rol === 'admin'" x-cloak><i class="fas fa-cog"></i> Admin</a>
      <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus me-1"></i> Recargar</a>
      <a href="#" onclick="showWithdrawModal()"><i class="fas fa-upload me-1"></i> Retirar</a>
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
    <div class="header-balance"><i class="fas fa-wallet me-1"></i> Bs <span id="navBalance" x-text="$store.app.balance.toFixed(2)">0.00</span></div>
    <a href="#" onclick="logout()" class="btn btn-outline-light btn-sm d-md-none" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h4><i class="fas fa-user me-2"></i> Mi Perfil</h4>
  </div>

  <!-- MIS DATOS -->
  <div class="section" style="padding-top:0;">
    <div class="stats-card mb-3">
      <h5><i class="fas fa-id-card me-1 text-primary"></i> Mis Datos</h5>
      <div id="misDatos">
        <div class="text-muted text-center py-3">Cargando...</div>
      </div>
    </div>

    <!-- DATOS BANCARIOS -->
    <div class="stats-card mb-3">
      <h5><i class="fas fa-university me-1 text-gold"></i> Datos Bancarios</h5>
      <div id="datosBancarios">
        <div class="text-muted text-center py-3">Cargando...</div>
      </div>
    </div>

    <!-- CODIGO DE REFERIDO -->
    <div class="stats-card mb-3">
      <h5><i class="fas fa-share-alt me-1 text-primary"></i> Código de Referido</h5>
      <div id="referidoInfo">
        <div class="text-muted text-center py-3">Cargando...</div>
      </div>
    </div>

    <!-- MIS RECARGAS -->
    <div class="stats-card mb-3">
      <h5><i class="fas fa-history me-1 text-success"></i> Mis Recargas</h5>
      <div id="recargasList">
        <div class="text-muted text-center py-3">Cargando...</div>
      </div>
    </div>

    <!-- MIS RETIROS -->
    <div class="stats-card mb-3">
      <h5><i class="fas fa-upload me-1 text-warning"></i> Mis Retiros</h5>
      <div id="retirosList">
        <div class="text-muted text-center py-3">Cargando...</div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
    <a href="tickets.html"><i class="fas fa-ticket"></i> Tickets</a>
    <a href="resultados.html"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html"><i class="fas fa-trophy"></i> Ganadores</a>
      <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus-circle"></i> Recargar</a>
      <a href="#" onclick="showWithdrawModal()"><i class="fas fa-upload"></i> Retirar</a>
      <a href="perfil.html" class="active"><i class="fas fa-user"></i> Perfil</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    document.addEventListener('alpine:init', () => {
      const u = JSON.parse(localStorage.getItem('animalito_user') || 'null');
      Alpine.store('app', { token: localStorage.getItem('animalito_token'), user: u, balance: u ? u.saldo : 0 });
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = requireAuth();
      if (!token) return;
      await updateBalanceDisplay();
      await cargarPerfil();
      await cargarRecargas();
      await cargarRetiros();
    });

    const ESTADOS_RECARGA = {
      pendiente: '<span class="badge bg-warning text-dark">🟡 Pendiente</span>',
      en_proceso: '<span class="badge bg-info text-white">🔵 En Proceso</span>',
      completado: '<span class="badge bg-success">🟢 Listo</span>',
      cancelado: '<span class="badge bg-danger">🔴 Cancelado</span>',
    };

    async function cargarPerfil() {
      const res = await apiFetch('/api/auth/perfil');
      if (!res.ok) return;
      const u = await res.json();
      localStorage.setItem(USER_KEY, JSON.stringify(u));
      if (window.Alpine) { Alpine.store('app').balance = u.saldo; Alpine.store('app').user = u; }

      const cedDisplay = formatCedula(u.cedula);
      const telDisplay = formatPhone(u.telefono);
      const bancoObj = BANCOS.find(b => b.codigo === u.banco_codigo);
      const bancoDisplay = bancoObj ? `${bancoObj.codigo} - ${bancoObj.nombre}` : (u.banco || '—');
      document.getElementById('misDatos').innerHTML = `
        <div class="stat-row"><span>Nombre</span><span class="stat-count">${u.nombre} ${u.apellido}</span></div>
        <div class="stat-row"><span>Correo</span><span class="stat-count">${u.correo}</span></div>
        <div class="stat-row"><span>Teléfono</span><span class="stat-count">${telDisplay || '—'}</span></div>
        <div class="stat-row"><span>Cédula</span><span class="stat-count">${cedDisplay || '—'}</span></div>
        <div class="stat-row"><span>Banco</span><span class="stat-count">${bancoDisplay}</span></div>
        <div class="stat-row"><span>Saldo</span><span class="stat-count text-gold fw-bold">Bs ${u.saldo.toFixed(2)}</span></div>
      `;

      // Mostrar código de referido
      document.getElementById('referidoInfo').innerHTML = `
        <p class="mb-2" style="font-size:13px;">Comparte tu código y gana <strong>5%</strong> de la primera recarga de tus referidos.</p>
        <div class="input-group">
          <input type="text" class="form-control" value="${u.codigo_referido || '—'}" id="codigoReferidoInput" readonly>
          <button class="btn btn-primary" onclick="copiarReferido()"><i class="fas fa-copy"></i></button>
        </div>
      `;

      const bancosOpts = BANCOS.map(b =>
        `<option value="${b.codigo}" ${u.banco_codigo === b.codigo ? 'selected' : ''}>${b.codigo} - ${b.nombre}</option>`
      ).join('');
      document.getElementById('datosBancarios').innerHTML = `
        <div class="mb-2">
          <label class="form-label" style="font-size:13px;">Cédula <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="banCedula" value="${u.cedula ? formatCedula(u.cedula) : ''}" placeholder="Ej: V-12345678">
          <div class="error-msg" id="banCedulaError"></div>
        </div>
        <div class="mb-2">
          <label class="form-label" style="font-size:13px;">Banco <span class="text-danger">*</span></label>
          <select class="form-select form-select-sm" id="banBanco">
            <option value="">Selecciona tu banco</option>
            ${bancosOpts}
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label" style="font-size:13px;">Teléfono Pago Móvil <span class="text-danger">*</span></label>
          <input type="tel" class="form-control form-control-sm" id="banTelefono" value="${u.telefono ? formatPhone(u.telefono) : ''}" placeholder="Ej: 0412-1234567">
          <div class="error-msg" id="banTelefonoError"></div>
        </div>
        <div class="mb-2">
          <label class="form-label" style="font-size:13px;">Titular <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="banTitular" value="${u.pago_movil_titular || ''}" placeholder="Nombre del titular">
        </div>
        <button class="btn btn-primary btn-sm mt-2" onclick="guardarDatosBancarios()"><i class="fas fa-save me-1"></i> Guardar</button>
      `;
    }

    async function guardarDatosBancarios() {
      document.querySelectorAll('#datosBancarios .error-msg').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('#datosBancarios .is-invalid').forEach(el => el.classList.remove('is-invalid'));

      const rawCedula = document.getElementById('banCedula').value.trim();
      const rawTelefono = document.getElementById('banTelefono').value.trim();
      const bancoCodigo = document.getElementById('banBanco').value;
      const titular = document.getElementById('banTitular').value.trim();

      let valid = true;

      const cv = validarCedulaVE(rawCedula);
      if (!cv.valido) {
        document.getElementById('banCedula').classList.add('is-invalid');
        document.getElementById('banCedulaError').textContent = cv.msg;
        document.getElementById('banCedulaError').classList.add('show');
        valid = false;
      }

      const tv = validarTelefonoVE(rawTelefono);
      if (!tv.valido) {
        document.getElementById('banTelefono').classList.add('is-invalid');
        document.getElementById('banTelefonoError').textContent = tv.msg;
        document.getElementById('banTelefonoError').classList.add('show');
        valid = false;
      }

      if (!bancoCodigo) {
        document.getElementById('banBanco').classList.add('is-invalid');
        valid = false;
      }

      if (!titular) {
        document.getElementById('banTitular').classList.add('is-invalid');
        valid = false;
      }

      if (!valid) return;

      const bancoObj = BANCOS.find(b => b.codigo === bancoCodigo);
      const body = {
        cedula: cv.cedula,
        telefono: tv.num,
        banco_codigo: bancoCodigo,
        banco: bancoObj ? bancoObj.nombre : '',
        pago_movil_titular: titular,
      };
      const res = await apiFetch('/api/auth/perfil', {
        method: 'PUT',
        body: JSON.stringify(body),
      });
      if (res.ok) {
        Swal.fire('Guardado', 'Datos bancarios actualizados', 'success');
        cargarPerfil();
      } else {
        const err = await res.json();
        Swal.fire('Error', err.detail || 'No se pudieron guardar los datos', 'error');
      }
    }

    async function cargarRecargas() {
      const container = document.getElementById('recargasList');
      const res = await apiFetch('/api/pagos/historial?tipo=recarga&limit=20');
      if (!res.ok) {
        container.innerHTML = '<div class="text-center text-muted py-3">Error al cargar recargas</div>';
        return;
      }
      const items = await res.json();
      if (items.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-3">No has realizado recargas aún</div>';
        return;
      }
      container.innerHTML = items.map(r => {
        let extra = {};
        try { extra = JSON.parse(r.descripcion || '{}'); } catch(e) {}
        const banco = extra.banco_origen ? (BANCOS.find(b => b.codigo === extra.banco_origen)?.nombre || extra.banco_origen) : '—';
        const tipo = extra.movement_type === 'MOVIL_PAY' ? 'Pago Móvil' : extra.movement_type === 'TRANSFER' ? 'Transferencia' : '—';
        const fecha = extra.fecha_pago || r.created_at.slice(0, 10);
        const badge = ESTADOS_RECARGA[r.estado] || r.estado;
        return `<div class="stat-row">
          <span><small class="text-muted">${fecha}</small><br><small>${banco} · ${tipo}</small></span>
          <span class="text-end"><strong class="text-gold">Bs ${r.monto.toFixed(2)}</strong><br>${badge}</span>
        </div>`;
      }).join('');
    }

    async function cargarRetiros() {
      const container = document.getElementById('retirosList');
      const res = await apiFetch('/api/pagos/historial?tipo=retiro&limit=20');
      if (!res.ok) {
        container.innerHTML = '<div class="text-center text-muted py-3">Error al cargar retiros</div>';
        return;
      }
      const items = await res.json();
      if (items.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-3">No has solicitado retiros aún</div>';
        return;
      }
      container.innerHTML = items.map(r => {
        const fecha = r.created_at.slice(0, 10);
        const badge = ESTADOS_RECARGA[r.estado] || r.estado;
        return `<div class="stat-row">
          <span><small class="text-muted">${fecha}</small></span>
          <span class="text-end"><strong class="text-warning">Bs ${r.monto.toFixed(2)}</strong><br>${badge}</span>
        </div>`;
      }).join('');
    }

    function copiarReferido() {
      const input = document.getElementById('codigoReferidoInput');
      if (!input) return;
      input.select();
      navigator.clipboard.writeText(input.value).then(() => {
        Swal.fire({ icon: 'success', title: 'Copiado', text: 'Código copiado al portapapeles', timer: 1500, showConfirmButton: false });
      }).catch(() => {});
    }

  </script>
</body>
</html>
