<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
      <a href="tickets.html"><i class="fas fa-ticket"></i> Tickets</a>
      <a href="resultados.html" class="active"><i class="fas fa-list"></i> Resultados</a>
      <a href="datos.html"><i class="fas fa-trophy"></i> Ganadores</a>
      <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
      <a href="admin.html" id="adminLink" style="display:none;"><i class="fas fa-cog"></i> Admin</a>
      <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus me-1"></i> Recargar</a>
      <a href="#" onclick="showWithdrawModal()"><i class="fas fa-upload me-1"></i> Retirar</a>
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
    <div class="header-balance"><i class="fas fa-wallet me-1"></i> Bs <span id="navBalance">0.00</span></div>
    <a href="#" onclick="logout()" class="btn btn-outline-light btn-sm d-md-none" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h4><i class="fas fa-list me-2"></i> Resultados de Sorteos</h4>
  </div>

  <!-- FILTERS -->
  <div class="section" style="padding-top:0;">
    <div class="stats-card mb-3">
      <label class="form-label fw-bold" style="font-size:13px;">Seleccionar Lotería</label>
      <select class="form-select" id="loteriaSelect" onchange="filterResults()">
        <option value="lotto_activo">Lotto Activo</option>
        <option value="la_granjita">La Granjita</option>
        <option value="selvaplus">Selva Plus</option>
      </select>
    </div>
    <div class="date-picker" style="padding:0;">
      <input type="date" id="datePicker">
      <button class="btn btn-gold btn-sm" onclick="filterResults()"><i class="fas fa-search"></i></button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container results-scroll">
    <table class="table-custom">
      <thead>
        <tr>
          <th>Hora</th>
          <th>Animal</th>
          <th>Número</th>
        </tr>
      </thead>
      <tbody id="resultsBody">
        <tr>
          <td colspan="3" class="text-center text-muted py-4">Cargando resultados...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-gamepad"></i> Jugar</a>
    <a href="tickets.html"><i class="fas fa-ticket"></i> Tickets</a>
    <a href="resultados.html" class="active"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html"><i class="fas fa-trophy"></i> Ganadores</a>
      <a href="#" onclick="showRechargeModal()"><i class="fas fa-plus-circle"></i> Recargar</a>
      <a href="#" onclick="showWithdrawModal()"><i class="fas fa-upload"></i> Retirar</a>
      <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = requireAuth();
      if (!token) return;
      await updateBalanceDisplay();
      const adminLink = document.getElementById('adminLink');
      if (adminLink) {
        const u = getUser();
        if (u && u.rol === 'admin') adminLink.style.display = '';
      }
      const picker = document.getElementById('datePicker');
      if (picker) {
        picker.valueAsDate = new Date();
        await renderResults();
        picker.addEventListener('change', filterResults);
      }
    });

    async function filterResults() {
      const val = document.getElementById('datePicker').value;
      const loteria = document.getElementById('loteriaSelect').value;
      await renderResults(val, loteria);
    }
  </script>
</body>
</html>
