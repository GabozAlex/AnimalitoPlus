<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="resultados.html" class="active">Resultados</a>
      <a href="datos.html">Estadísticas</a>
      <a href="dashboard.html" id="navJugar" class="d-none">Jugar</a>
      <a href="perfil.html" id="navPerfil" class="d-none">Perfil</a>
      <a href="#" id="navSalir" class="d-none" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</a>
      <a href="login.html" id="navIngresar">Ingresar</a>
    </nav>
    <a href="login.html" id="mobileLogin" class="btn btn-gold btn-sm d-md-none"><i class="fas fa-user"></i></a>
    <a href="#" id="mobileLogout" class="btn btn-outline-light btn-sm d-md-none d-none" onclick="logout()" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h4><i class="fas fa-list me-2"></i> Resultados de Sorteos</h4>
  </div>

  <!-- DATE PICKER -->
  <div class="date-picker">
    <input type="date" id="datePicker">
    <button class="btn btn-gold btn-sm" onclick="filterResults()"><i class="fas fa-search"></i></button>
  </div>

  <!-- TABLE -->
  <div class="table-container results-scroll">
    <table class="table-custom">
      <thead>
        <tr>
          <th>Hora</th>
          <th>Animal</th>
          <th>Número</th>
        </tr>
      </thead>
      <tbody id="resultsBody">
        <tr>
          <td colspan="3" class="text-center text-muted py-4">Cargando resultados...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
    <a href="resultados.html" class="active"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html"><i class="fas fa-chart-bar"></i> Datos</a>
    <a href="perfil.html" id="bottomPerfil" class="d-none"><i class="fas fa-user"></i> Perfil</a>
    <a href="login.html" id="bottomIngresar"><i class="fas fa-user"></i> Ingresar</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('animalito_token');
      const loggedIn = !!token;
      document.querySelectorAll('.d-none.logged-in').forEach(el => el.classList.remove('d-none'));
      for (const id of ['navJugar', 'navPerfil', 'navSalir', 'bottomPerfil', 'mobileLogout']) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('d-none', !loggedIn);
      }
      for (const id of ['navIngresar', 'bottomIngresar', 'mobileLogin']) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('d-none', loggedIn);
      }
      const picker = document.getElementById('datePicker');
      picker.valueAsDate = new Date();
      renderResults();
      picker.addEventListener('change', filterResults);
    });

    async function filterResults() {
      const val = document.getElementById('datePicker').value;
      await renderResults(val);
    }
  </script>
</body>
</html>
