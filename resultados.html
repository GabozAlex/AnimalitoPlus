<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados - AnimalitoPlus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak]{display:none!important}</style>
</head>
<body x-data>

  <!-- HEADER -->
  <header class="main-header">
    <a href="index.html" class="logo">
      <i class="fas fa-paw"></i> Animalito<span>Plus</span>
    </a>
    <nav class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
      <a href="resultados.html" class="active"><i class="fas fa-list"></i> Resultados</a>
      <a href="datos.html"><i class="fas fa-chart-bar"></i> Estadísticas</a>
      <a href="dashboard.html" x-show="$store.app.token" x-cloak><i class="fas fa-gamepad"></i> Jugar</a>
      <a href="perfil.html" x-show="$store.app.token" x-cloak><i class="fas fa-user"></i> Perfil</a>
      <a href="#" onclick="logout()" x-show="$store.app.token" x-cloak><i class="fas fa-sign-out-alt"></i> Salir</a>
      <a href="login.html" x-show="!$store.app.token" x-cloak><i class="fas fa-sign-in-alt"></i> Ingresar</a>
    </nav>
    <div class="header-balance" x-show="$store.app.token" x-cloak><i class="fas fa-wallet me-1"></i> Bs <span x-text="$store.app.balance.toFixed(2)">0.00</span></div>
    <a href="#" onclick="logout()" x-show="$store.app.token" x-cloak class="btn btn-outline-light btn-sm d-md-none" style="border-color:var(--text);color:var(--text);"><i class="fas fa-sign-out-alt"></i></a>
    <a href="login.html" x-show="!$store.app.token" x-cloak class="btn btn-gold btn-sm d-md-none"><i class="fas fa-user"></i></a>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h4><i class="fas fa-list me-2"></i> Resultados de Sorteos</h4>
  </div>

  <!-- DATE PICKER -->
  <div class="date-picker">
    <input type="date" id="datePicker">
    <button class="btn btn-gold btn-sm" onclick="filterResults()"><i class="fas fa-search"></i></button>
  </div>

  <!-- TABLE -->
  <div class="table-container results-scroll">
    <table class="table-custom">
      <thead>
        <tr>
          <th>Hora</th>
          <th>Animal</th>
          <th>Número</th>
        </tr>
      </thead>
      <tbody id="resultsBody">
        <tr>
          <td colspan="3" class="text-center text-muted py-4">Cargando resultados...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
    <a href="resultados.html" class="active"><i class="fas fa-list"></i> Resultados</a>
    <a href="datos.html"><i class="fas fa-chart-bar"></i> Estadísticas</a>
    <a href="perfil.html" x-show="$store.app.token" x-cloak><i class="fas fa-user"></i> Perfil</a>
    <a href="login.html" x-show="!$store.app.token" x-cloak><i class="fas fa-user"></i> Ingresar</a>
    <a href="#" onclick="logout()" x-show="$store.app.token" x-cloak><i class="fas fa-sign-out-alt"></i> Salir</a>
    <a href="dashboard.html" x-show="$store.app.token" x-cloak><i class="fas fa-gamepad"></i> Jugar</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>document.addEventListener('alpine:init',()=>{const u=(()=>{try{return JSON.parse(localStorage.getItem('animalito_user'))}catch(e){return null}})();Alpine.store('app',{token:localStorage.getItem('animalito_token'),user:u,balance:u?u.saldo:0})});</script>
  <script defer src="//cdn.jsdelivr.net/npm/alpinejs@3"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const picker = document.getElementById('datePicker');
      if (picker) {
        picker.valueAsDate = new Date();
        await renderResults();
        picker.addEventListener('change', filterResults);
      }
    });

    async function filterResults() {
      const val = document.getElementById('datePicker').value;
      await renderResults(val);
    }
  </script>
</body>
</html>
